<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureScan – Web Vulnerability Scanner</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #f1f5f9;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
    }
    .form-control {
      background: #0f172a;
      border-color: #334155;
      color: #fff;
    }
    .btn-primary {
      background: #3b82f6;
      border: none;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }
    .btn-primary:hover {
      background: #2563eb;
    }
  </style>
</head>
<body class="py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="display-5 fw-bold">
        <span class="text-primary">SecureScan</span> – Web Vulnerability Scanner
      </h1>
      <p class="lead text-muted">
        Fast, lightweight OWASP‑inspired scanner for common web issues.
      </p>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-lg p-4 border-0">
          <h4 class="mb-4">Enter URL to Scan</h4>
          <form action="/scan" method="POST">
            <div class="mb-3">
              <label for="url" class="form-label fw-semibold">
                Target URL
              </label>
              <input
                type="text"
                class="form-control"
                id="url"
                name="url"
                placeholder="https://example.com"
                value=""
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              Start Scan
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
